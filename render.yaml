services:
  - type: web
    name: roadresq
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
        placeholder: "mongodb+srv://<username>:<password>@<cluster>.mongodb.net/RoadResQ"
      - key: GEMINI_API_KEY
        sync: false
        placeholder: "your_gemini_api_key"
      - key: GOOGLE_MAPS_API_KEY
        sync: false
        placeholder: "your_google_maps_api_key"
      - key: SMTP_HOST
        sync: false
        optional: true
      - key: SMTP_PORT
        sync: false
        optional: true
      - key: SMTP_SECURE
        sync: false
        optional: true
      - key: SMTP_USER
        sync: false
        optional: true
      - key: SMTP_PASS
        sync: false
        optional: true
